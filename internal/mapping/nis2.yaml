id: nis2
name: "NIS2 Article 21 — Security Requirements"
version: "Directive (EU) 2022/2555"
controls:
  - id: art21-2-a
    article: "21.2(a)"
    name: "Risk analysis and information system security policies"
    severity: HIGH
    description: >
      Policies for risk analysis and information system security, including risk
      management procedures for network and information systems.
    remediation: >
      Enforce Pod Security Standards (restricted profile). Set resource limits,
      prevent privilege escalation, and run containers as non-root.
    mapped_checks:
      - C-0013 # Non-root containers
      - C-0017 # Immutable container filesystem
      - C-0057 # Privileged container
      - C-0016 # Allow privilege escalation
      - C-0020 # Mount service principal
      - C-0055 # Linux hardening

  - id: art21-2-b
    article: "21.2(b)"
    name: "Incident handling"
    severity: CRITICAL
    description: >
      Procedures for detecting, analysing, containing, and recovering from
      incidents. Significant incidents must be reported to competent authorities.
    remediation: >
      Enable Kubernetes audit logging with a comprehensive audit policy.
      Ensure audit-log-path and audit-log-maxage are configured on the API server.
    mapped_checks:
      - C-0067 # Audit logs enabled

  - id: art21-2-c
    article: "21.2(c)"
    name: "Business continuity and crisis management"
    severity: HIGH
    description: >
      Plans for maintaining or quickly restoring services after an incident,
      including backup management and disaster recovery procedures.
    remediation: >
      Define PodDisruptionBudgets for all critical workloads. Ensure no
      single-replica deployments exist for production services.
    mapped_checks:
      - C-0068 # Single replica deployments
      - C-0069 # No PDB defined

  - id: art21-2-d
    article: "21.2(d)"
    name: "Supply chain security"
    severity: CRITICAL
    description: >
      Security in the supply chain, including security aspects of relationships
      with direct suppliers and service providers.
    remediation: >
      Allow only images from explicitly approved registries. Pin all image tags
      (never use :latest). Implement image signing (Cosign/Notary).
    mapped_checks:
      - C-0036 # Sudo in container entrypoint
      - C-0014 # Resources memory request
      - C-0270 # Ensure image pull policy is set to Always
      - C-0046 # Insecure capabilities

  - id: art21-2-e
    article: "21.2(e)"
    name: "Network and information systems security"
    severity: HIGH
    description: >
      Security in the acquisition, development, and maintenance of network
      and information systems, including vulnerability handling.
    remediation: >
      Define NetworkPolicies for every namespace to restrict ingress and egress.
      Default-deny policies should be the baseline.
    mapped_checks:
      - C-0030 # Ingress and Egress blocked
      - C-0031 # Network policy not set
      - C-0066 # Secret/etcd encryption

  - id: art21-2-f
    article: "21.2(f)"
    name: "Vulnerability handling and disclosure"
    severity: HIGH
    description: >
      Policies and procedures to assess the effectiveness of cybersecurity
      risk-management measures, including vulnerability handling.
    remediation: >
      Remediate all CRITICAL and HIGH CVEs in container images. Implement
      regular vulnerability scanning in CI/CD pipelines. Install Trivy for
      full vulnerability coverage.
    mapped_checks:
      - C-0270 # Image pull policy Always (freshness signal)
      - C-0016 # Allow privilege escalation
      - C-0057 # Privileged container

  - id: art21-2-g
    article: "21.2(g)"
    name: "Assess effectiveness of cybersecurity measures"
    severity: MEDIUM
    description: >
      Policies to assess effectiveness of cybersecurity measures, including
      use of industry benchmarks.
    remediation: >
      Achieve a passing CIS Kubernetes Benchmark score. Automate benchmark
      checks in CI/CD to prevent regressions.
    mapped_checks:
      - C-0005 # API server insecure port
      - C-0088 # RBAC enabled
      - C-0053 # Access container service account
      - C-0063 # Etcd peer TLS

  - id: art21-2-h
    article: "21.2(h)"
    name: "Basic cyber hygiene and training"
    severity: MEDIUM
    description: >
      Basic cyber hygiene practices and cybersecurity training for staff.
    remediation: >
      Remove cluster-admin bindings not strictly required. Disable ServiceAccount
      token automounting where not needed. Apply least-privilege RBAC.
    mapped_checks:
      - C-0035 # Cluster admin binding
      - C-0041 # ServiceAccount token automount
      - C-0044 # Container hostPort
      - C-0048 # HostPath mount
      - C-0038 # Host PID/IPC privileges

  - id: art21-2-i
    article: "21.2(i)"
    name: "HR security, access control and asset management"
    severity: HIGH
    description: >
      Policies for human resources security, access control policies, and
      asset management covering network and information systems.
    remediation: >
      Disable anonymous authentication on the API server. Enable RBAC.
      Audit all service account permissions regularly.
    mapped_checks:
      - C-0015 # Privileged RBAC roles
      - C-0058 # Access to secrets
      - C-0036 # Sudo in container entrypoint
      - C-0187 # Roles with delete capabilities
      - C-0188 # Roles with read secrets permissions

  - id: art21-2-j
    article: "21.2(j)"
    name: "MFA and continuous authentication"
    severity: CRITICAL
    description: >
      Use of multi-factor authentication or continuous authentication
      solutions where appropriate.
    remediation: >
      Disable anonymous access. Remove insecure API server ports. Enable RBAC.
      Ensure all human access to clusters uses federated identity with MFA.
    mapped_checks:
      - C-0005 # API server insecure port
      - C-0088 # RBAC enabled
      - C-0262 # Anonymous access enabled
      - C-0256 # Configured liveness probe
